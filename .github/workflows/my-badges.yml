name: my-badges

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 */10 * *"

permissions:
  contents: write

jobs:
  my-badges:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Update My Badges
        run: npx update-my-badges ${{ github.repository_owner }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
